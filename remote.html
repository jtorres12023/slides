<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Slide Remote</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100dvh;
      background: #111827;
      color: #f9fafb;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      overscroll-behavior: none;
      overflow: hidden;
    }
    button, input { font: inherit; }
    button { touch-action: manipulation; }
    .remote {
      width: min(100%, 680px);
      height: 100dvh;
      min-height: 0;
      padding: max(20px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-rows: auto minmax(265px, 44dvh) minmax(0, 1fr);
      gap: 18px;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #d1d5db;
      white-space: nowrap;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }
    .status.connected .status-dot { background: #22c55e; }
    .now-playing {
      border-bottom: 1px solid #374151;
      padding: 16px 2px;
    }
    .deck-title {
      margin: 0 0 5px;
      color: #d1d5db;
      font-size: 0.95rem;
      overflow-wrap: anywhere;
    }
    .slide-position {
      margin: 0;
      font-size: clamp(2rem, 10vw, 3.5rem);
      line-height: 1;
      font-weight: 800;
    }
    .primary-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      min-height: 130px;
    }
    .nav-button {
      border: 1px solid #4b5563;
      border-radius: 8px;
      background: #1f2937;
      color: #fff;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
    }
    .nav-button:active {
      background: #374151;
      transform: translateY(1px);
    }
    .nav-icon {
      font-size: clamp(4rem, 22vw, 7rem);
      line-height: 0.8;
      font-weight: 300;
    }
    .nav-label {
      font-size: 1rem;
      font-weight: 700;
    }
    .secondary-controls {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .small-button {
      height: 50px;
      border: 1px solid #4b5563;
      border-radius: 8px;
      background: #1f2937;
      color: #fff;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .jump-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    .jump-control input {
      width: 100%;
      height: 50px;
      border: 1px solid #4b5563;
      border-radius: 8px;
      background: #fff;
      color: #111827;
      padding: 0 14px;
      font-size: 1.1rem;
    }
    .controls {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }
    .notes {
      min-height: 0;
      border-top: 1px solid #374151;
      padding-top: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }
    .notes-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .notes-header h2 {
      margin: 0;
      font-size: 1rem;
    }
    .notes-hint {
      color: #9ca3af;
      font-size: 0.8rem;
    }
    .notes-content {
      min-height: 0;
      overflow-y: auto;
      padding-right: 8px;
      color: #e5e7eb;
      font-size: 0.92rem;
      line-height: 1.38;
    }
    .notes-content h1,
    .notes-content h2,
    .notes-content h3 {
      color: #fff;
      line-height: 1.2;
    }
    .notes-content h1 { font-size: 1.15rem; margin: 0 0 12px; }
    .notes-content h2 { font-size: 1.05rem; margin: 20px 0 8px; }
    .notes-content h3 { font-size: 0.95rem; margin: 16px 0 6px; }
    .notes-content p { margin: 0 0 9px; }
    .notes-content ul { margin: 0 0 9px 18px; padding: 0; }
    .notes-content li { margin: 0 0 4px; }
    .notes-content blockquote {
      margin: 10px 0;
      padding: 8px 10px;
      border-left: 3px solid #818cf8;
      color: #d1d5db;
      background: #1f2937;
    }
    .notes-content strong { color: #fff; }
    .notes-content::-webkit-scrollbar { width: 8px; }
    .notes-content::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    @media (max-width: 420px) {
      .remote { gap: 14px; }
      .remote { grid-template-rows: auto minmax(265px, 44dvh) minmax(0, 1fr); }
      .nav-button { min-height: 0; }
      .small-button { padding: 0 12px; }
    }
    @media (min-width: 760px) and (orientation: landscape) {
      .remote {
        width: min(100%, 1100px);
        grid-template-columns: minmax(300px, 0.9fr) minmax(340px, 1.1fr);
        grid-template-rows: auto 1fr;
      }
      .header { grid-column: 1 / -1; }
      .controls { min-height: 0; }
      .notes {
        border-top: 0;
        border-left: 1px solid #374151;
        padding: 0 0 0 18px;
      }
    }
  </style>
</head>
<body>
  <main class="remote">
    <header class="header">
      <h1>Slide Remote</h1>
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span id="statusText">Connecting</span>
      </div>
    </header>

    <section class="controls" aria-label="Slide controls">
      <div class="now-playing" aria-live="polite">
        <p class="deck-title" id="deckTitle">Waiting for presentation</p>
        <p class="slide-position"><span id="currentSlide">-</span> / <span id="totalSlides">-</span></p>
      </div>

      <section class="primary-controls" aria-label="Slide navigation">
        <button type="button" class="nav-button" data-command="previous" aria-label="Previous slide">
          <span class="nav-icon" aria-hidden="true">&#8592;</span>
          <span class="nav-label">Previous</span>
        </button>
        <button type="button" class="nav-button" data-command="next" aria-label="Next slide">
          <span class="nav-icon" aria-hidden="true">&#8594;</span>
          <span class="nav-label">Next</span>
        </button>
      </section>

      <section class="secondary-controls" aria-label="Jump controls">
        <button type="button" class="small-button" data-command="first">First</button>
        <div class="jump-control">
          <input type="number" id="slideInput" min="1" inputmode="numeric" aria-label="Slide number" placeholder="Slide" />
          <button type="button" class="small-button" id="goButton">Go</button>
        </div>
        <button type="button" class="small-button" data-command="last">Last</button>
      </section>
    </section>

    <section class="notes" aria-label="Lesson plan">
      <div class="notes-header">
        <h2>Lesson Plan</h2>
        <span class="notes-hint" id="notesHint">Waiting for deck</span>
      </div>
      <article class="notes-content" id="notesContent">
        <p>Start the presentation to load its lesson plan.</p>
      </article>
    </section>
  </main>

  <script>
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const deckTitle = document.getElementById('deckTitle');
    const currentSlide = document.getElementById('currentSlide');
    const totalSlides = document.getElementById('totalSlides');
    const slideInput = document.getElementById('slideInput');
    const goButton = document.getElementById('goButton');
    const notesContent = document.getElementById('notesContent');
    const notesHint = document.getElementById('notesHint');
    const planFiles = {
      june21: 'june21-lesson-outline.md',
      june7: 'june7-lesson-outline.md'
    };
    let loadedPlan = null;

    function setConnected(connected) {
      status.classList.toggle('connected', connected);
      statusText.textContent = connected ? 'Connected' : 'Reconnecting';
    }

    function applyState(state) {
      deckTitle.textContent = state.deckTitle || 'Slideshow';
      currentSlide.textContent = state.slide || '-';
      totalSlides.textContent = state.totalSlides || '-';
      if (state.totalSlides) {
        slideInput.max = String(state.totalSlides);
      }
      loadLessonPlan(state.deckId);
    }

    function stripMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\[(.*?)\]\([^)]*\)/g, '$1')
        .replace(/`([^`]+)`/g, '$1');
    }

    function appendTextElement(tag, text) {
      const element = document.createElement(tag);
      element.textContent = stripMarkdown(text);
      notesContent.appendChild(element);
      return element;
    }

    function renderLessonPlan(markdown) {
      notesContent.replaceChildren();
      let list = null;

      markdown.split(/\r?\n/).forEach(rawLine => {
        const line = rawLine.trim();
        if (!line) {
          list = null;
          return;
        }
        if (line.startsWith('# ')) {
          appendTextElement('h1', line.slice(2));
          list = null;
        } else if (line.startsWith('## ')) {
          appendTextElement('h2', line.slice(3));
          list = null;
        } else if (line.startsWith('### ')) {
          appendTextElement('h3', line.slice(4));
          list = null;
        } else if (line.startsWith('> ')) {
          appendTextElement('blockquote', line.slice(2));
          list = null;
        } else if (line.startsWith('- ')) {
          if (!list) {
            list = document.createElement('ul');
            notesContent.appendChild(list);
          }
          const item = document.createElement('li');
          item.textContent = stripMarkdown(line.slice(2));
          list.appendChild(item);
        } else {
          appendTextElement('p', line);
          list = null;
        }
      });
    }

    async function loadLessonPlan(deckId) {
      const fileName = planFiles[deckId];
      if (!fileName || fileName === loadedPlan) return;
      loadedPlan = fileName;
      notesHint.textContent = 'Loading notes';

      try {
        const response = await fetch('/' + fileName, { cache: 'no-store' });
        if (!response.ok) throw new Error('Plan unavailable');
        renderLessonPlan(await response.text());
        notesHint.textContent = 'Scroll for notes';
      } catch (error) {
        loadedPlan = null;
        notesContent.replaceChildren();
        appendTextElement('p', 'Lesson plan unavailable on this server.');
        notesHint.textContent = 'Unavailable';
      }
    }

    async function sendCommand(command, slide) {
      try {
        const response = await fetch('/api/remote/command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ command, slide })
        });
        if (!response.ok) throw new Error('Command failed');
      } catch (error) {
        setConnected(false);
      }
    }

    document.querySelectorAll('[data-command]').forEach(button => {
      button.addEventListener('click', () => sendCommand(button.dataset.command));
    });

    function goToSlide() {
      const slide = Number.parseInt(slideInput.value, 10);
      if (!Number.isInteger(slide) || slide < 1) return;
      sendCommand('goto', slide);
      slideInput.value = '';
    }

    goButton.addEventListener('click', goToSlide);
    slideInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') goToSlide();
    });

    const events = new EventSource('/api/remote/events');
    events.addEventListener('open', () => setConnected(true));
    events.addEventListener('error', () => setConnected(false));
    events.addEventListener('state', event => applyState(JSON.parse(event.data)));
  </script>
</body>
</html>
